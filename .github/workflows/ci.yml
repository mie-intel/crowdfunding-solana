name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: pkg-config libudev-dev libssl-dev
          version: 1.0

      - name: Cache Solana CLI
        id: cache-solana
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana
          key: solana-3.1.11-linux

      - name: Install Solana CLI
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: sh -c "$(curl -sSfL https://release.anza.xyz/v3.1.11/install)"

      - name: Add Solana to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Rust 1.92.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0

      - name: Cache Anchor CLI
        id: cache-anchor
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/anchor
          key: anchor-1.0.0-linux

      - name: Install Anchor CLI
        if: steps.cache-anchor.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -L https://github.com/solana-foundation/anchor/releases/download/v1.0.0/anchor-1.0.0-x86_64-unknown-linux-gnu \
            -o ~/.local/bin/anchor
          chmod +x ~/.local/bin/anchor

      - name: Add Anchor to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-linux-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Node dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Restore program keypair
        run: |
          mkdir -p target/deploy
          echo '${{ secrets.PROGRAM_KEYPAIR }}' > target/deploy/crowdfunding-keypair.json

      - name: Build program
        run: anchor build

      - name: Generate Solana keypair
        run: |
          solana-keygen new --no-bip39-passphrase --silent
          solana config set --url localhost

      - name: Run anchor tests
        run: anchor test --skip-build --provider.cluster localnet
